name: Update Lotto DB

on:
  schedule:
    # 한국 시간(KST) 토요일 자정(24:00) = UTC 토요일 15:00
    - cron: '0 15 * * 6'
  workflow_dispatch:

jobs:
  update-lotto:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run lotto DB update script
        run: node fetch_lotto.js

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add js/lotto-db.json

          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: 로또 DB 자동 업데이트" && git push)
